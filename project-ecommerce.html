<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shop — Mohamed El Amine Ider</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f6f1;
    --white: #ffffff;
    --ink: #1c1a15;
    --muted: #7a7262;
    --border: rgba(28,26,21,0.1);
    --green: #2d6a4f;
    --green-light: #e8f5ee;
    --red: #c0392b;
    --accent: #3a5a8c;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); }

  a.back-link {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--muted); text-decoration: none; font-size: 13px;
    padding: 1rem 1.5rem; transition: color 0.2s;
  }
  a.back-link:hover { color: var(--accent); }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(248,246,241,0.92); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 2.5rem;
  }
  .store-logo {
    font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600;
    color: var(--ink); text-decoration: none;
  }
  .store-logo em { font-style: italic; color: var(--green); }
  .header-nav { display: flex; gap: 1.5rem; list-style: none; }
  .header-nav a { font-size: 14px; color: var(--muted); text-decoration: none; transition: color 0.2s; }
  .header-nav a:hover { color: var(--ink); }
  .cart-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 18px; background: var(--ink); color: white;
    border: none; border-radius: 999px; font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s;
  }
  .cart-btn:hover { background: var(--green); }
  .cart-count {
    background: var(--green); color: white; width: 18px; height: 18px;
    border-radius: 50%; font-size: 10px; display: inline-flex;
    align-items: center; justify-content: center; font-weight: 500;
  }

  /* HERO BANNER */
  .hero-banner {
    background: var(--ink); color: white; padding: 5rem 2.5rem;
    display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center;
    min-height: 400px;
  }
  .banner-tag {
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(255,255,255,0.4); margin-bottom: 1rem;
  }
  .banner-title {
    font-family: 'Fraunces', serif; font-size: clamp(2.5rem, 5vw, 4rem);
    font-weight: 600; line-height: 1.05; margin-bottom: 1.25rem;
  }
  .banner-title em { font-style: italic; color: #a8d5b8; }
  .banner-sub { font-size: 16px; font-weight: 300; color: rgba(255,255,255,0.6); margin-bottom: 2rem; line-height: 1.7; }
  .btn-banner {
    padding: 14px 32px; background: white; color: var(--ink);
    border-radius: 999px; font-size: 14px; font-weight: 500;
    text-decoration: none; display: inline-block; transition: all 0.2s;
  }
  .btn-banner:hover { background: #a8d5b8; transform: translateY(-2px); }
  .banner-visual {
    aspect-ratio: 1; background: var(--green);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-size: 72px; font-weight: 600; font-style: italic;
    color: rgba(255,255,255,0.2); max-width: 320px; margin: 0 auto;
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.5rem 2.5rem; border-bottom: 1px solid var(--border);
    background: var(--white);
  }
  .filter-tabs { display: flex; gap: 0.5rem; }
  .filter-tab {
    padding: 7px 16px; border-radius: 999px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border); background: transparent;
    color: var(--muted); transition: all 0.15s; font-family: 'DM Sans', sans-serif;
  }
  .filter-tab:hover, .filter-tab.active { background: var(--ink); color: white; border-color: var(--ink); }
  .sort-select {
    font-size: 13px; color: var(--muted); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 12px; background: transparent;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
  }

  /* PRODUCT GRID */
  .shop-main { padding: 2.5rem; max-width: 1300px; margin: 0 auto; }
  .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
  .product-card {
    background: var(--white); border-radius: 16px; overflow: hidden;
    border: 1px solid var(--border); transition: all 0.3s; position: relative;
  }
  .product-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(28,26,21,0.08); }
  .product-img {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-size: 52px; font-weight: 300; font-style: italic;
    color: rgba(255,255,255,0.4); position: relative;
  }
  .badge {
    position: absolute; top: 12px; left: 12px;
    padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 500;
  }
  .badge-new { background: var(--accent); color: white; }
  .badge-sale { background: var(--red); color: white; }
  .badge-eco { background: var(--green-light); color: var(--green); }
  .wishlist-btn {
    position: absolute; top: 12px; right: 12px;
    width: 32px; height: 32px; border-radius: 50%;
    background: white; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px; transition: all 0.2s;
    color: var(--muted);
  }
  .wishlist-btn:hover, .wishlist-btn.active { color: var(--red); border-color: var(--red); }
  .product-info { padding: 1.25rem; }
  .product-category { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .product-name { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; margin-bottom: 4px; line-height: 1.2; }
  .product-desc { font-size: 13px; color: var(--muted); margin-bottom: 1rem; line-height: 1.5; }
  .product-footer { display: flex; align-items: center; justify-content: space-between; }
  .product-price { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; }
  .product-price .old { font-size: 13px; color: var(--muted); text-decoration: line-through; margin-right: 6px; font-family: 'DM Sans', sans-serif; font-weight: 400; }
  .add-btn {
    padding: 9px 18px; background: var(--ink); color: white;
    border: none; border-radius: 999px; font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s;
  }
  .add-btn:hover { background: var(--green); }
  .add-btn.added { background: var(--green); }

  /* CART DRAWER */
  .cart-overlay {
    position: fixed; inset: 0; background: rgba(28,26,21,0.5);
    z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .cart-overlay.open { opacity: 1; pointer-events: all; }
  .cart-drawer {
    position: fixed; top: 0; right: 0; bottom: 0; width: 380px;
    background: var(--white); z-index: 201;
    transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
    display: flex; flex-direction: column;
  }
  .cart-drawer.open { transform: translateX(0); }
  .cart-drawer-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 1.5rem; border-bottom: 1px solid var(--border);
  }
  .cart-drawer-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; }
  .close-btn {
    width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border);
    background: none; cursor: pointer; font-size: 16px; color: var(--muted);
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .close-btn:hover { background: var(--bg); }
  .cart-items { flex: 1; overflow-y: auto; padding: 1.25rem; }
  .cart-empty { text-align: center; padding: 4rem 1rem; color: var(--muted); font-size: 14px; }
  .cart-item {
    display: flex; gap: 1rem; padding: 1rem 0;
    border-bottom: 1px solid var(--border);
  }
  .cart-item-thumb {
    width: 64px; height: 64px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .cart-item-price { font-size: 13px; color: var(--muted); }
  .cart-item-remove { font-size: 12px; color: var(--red); cursor: pointer; margin-top: 4px; background: none; border: none; font-family: 'DM Sans', sans-serif; padding: 0; }
  .cart-footer { padding: 1.5rem; border-top: 1px solid var(--border); }
  .cart-total { display: flex; justify-content: space-between; font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
  .checkout-btn {
    width: 100%; padding: 16px; background: var(--ink); color: white;
    border: none; border-radius: 999px; font-size: 15px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s;
  }
  .checkout-btn:hover { background: var(--green); }

  @media (max-width: 768px) {
    .hero-banner { grid-template-columns: 1fr; }
    .banner-visual { display: none; }
    header { padding: 1rem 1.25rem; }
    .header-nav { display: none; }
  }
</style>
</head>
<body>

<a class="back-link" href="portfolio.html">← Back to portfolio</a>

<!-- HEADER -->
<header>
  <a href="#" class="store-logo">ver<em>de</em></a>
  <ul class="header-nav">
    <li><a href="#">Shop</a></li>
    <li><a href="#">Collections</a></li>
    <li><a href="#">About</a></li>
  </ul>
  <button class="cart-btn" onclick="openCart()">
    Basket <span class="cart-count" id="cartCount">0</span>
  </button>
</header>

<!-- HERO BANNER -->
<div class="hero-banner">
  <div>
    <div class="banner-tag">New collection — Spring 2026</div>
    <h1 class="banner-title">Good things,<br><em>naturally.</em></h1>
    <p class="banner-sub">Thoughtfully sourced, beautifully designed products for a more intentional life.</p>
    <a href="#products" class="btn-banner">Shop now</a>
  </div>
  <div class="banner-visual">vd</div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <div class="filter-tabs">
    <button class="filter-tab active" onclick="filterProducts('all', this)">All</button>
    <button class="filter-tab" onclick="filterProducts('home', this)">Home</button>
    <button class="filter-tab" onclick="filterProducts('beauty', this)">Beauty</button>
    <button class="filter-tab" onclick="filterProducts('food', this)">Food</button>
  </div>
  <select class="sort-select"><option>Sort: Featured</option><option>Price: Low to High</option><option>Price: High to Low</option><option>Newest</option></select>
</div>

<!-- PRODUCTS -->
<div class="shop-main" id="products">
  <div class="products-grid" id="productsGrid"></div>
</div>

<!-- CART OVERLAY + DRAWER -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-drawer-header">
    <span class="cart-drawer-title">Your basket</span>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems">
    <div class="cart-empty">Your basket is empty.</div>
  </div>
  <div class="cart-footer">
    <div class="cart-total"><span>Total</span><span id="cartTotal">$0.00</span></div>
    <button class="checkout-btn">Proceed to checkout</button>
  </div>
</div>

<script>
const products = [
  { id:1, name:'Linen Throw', category:'home', price:89, badge:'new', color:'#b5835a', emoji:'🪵', desc:'Stonewashed Belgian linen in warm earth tones.' },
  { id:2, name:'Sea Salt Scrub', category:'beauty', price:38, oldPrice:52, badge:'sale', color:'#7aadbe', emoji:'🌊', desc:'Exfoliating blend with sea minerals & coconut.' },
  { id:3, name:'Wild Honey', category:'food', price:22, badge:'eco', color:'#e6a817', emoji:'🍯', desc:'Raw, unfiltered honey from wildflower meadows.' },
  { id:4, name:'Cedar Candle', category:'home', price:44, badge:'new', color:'#8c6d52', emoji:'🕯️', desc:'100-hour burn time, hand-poured soy wax.' },
  { id:5, name:'Rose Face Oil', category:'beauty', price:64, badge:null, color:'#d4879a', emoji:'🌹', desc:'Cold-pressed rosehip with vitamin C complex.' },
  { id:6, name:'Herbal Tea Set', category:'food', price:35, badge:'eco', color:'#5a9e72', emoji:'🌿', desc:'Six organic blends, sustainably packaged.' },
  { id:7, name:'Wabi Vase', category:'home', price:75, badge:null, color:'#9b8c7a', emoji:'🏺', desc:'Hand-thrown stoneware with natural glaze.' },
  { id:8, name:'Matcha Powder', category:'food', price:28, oldPrice:36, badge:'sale', color:'#5e8f4e', emoji:'🍵', desc:'Ceremonial grade from Uji, Japan.' },
];

let cart = [];
let currentFilter = 'all';

function renderProducts(filter) {
  const grid = document.getElementById('productsGrid');
  const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);
  grid.innerHTML = filtered.map(p => `
    <div class="product-card" data-id="${p.id}">
      <div class="product-img" style="background:${p.color};">
        ${p.badge ? `<span class="badge badge-${p.badge}">${p.badge}</span>` : ''}
        <button class="wishlist-btn" onclick="toggleWish(this)" title="Wishlist">♡</button>
        <span style="font-size:52px;">${p.emoji}</span>
      </div>
      <div class="product-info">
        <div class="product-category">${p.category}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.desc}</div>
        <div class="product-footer">
          <div class="product-price">
            ${p.oldPrice ? `<span class="old">$${p.oldPrice}</span>` : ''}$${p.price}
          </div>
          <button class="add-btn" onclick="addToCart(${p.id}, this)">Add</button>
        </div>
      </div>
    </div>
  `).join('');
}

function filterProducts(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderProducts(filter);
}

function addToCart(id, btn) {
  const p = products.find(p => p.id === id);
  cart.push(p);
  btn.textContent = 'Added!';
  btn.classList.add('added');
  setTimeout(() => { btn.textContent = 'Add'; btn.classList.remove('added'); }, 1500);
  updateCart();
}

function removeFromCart(index) {
  cart.splice(index, 1);
  updateCart();
  renderCart();
}

function toggleWish(btn) { btn.classList.toggle('active'); btn.textContent = btn.classList.contains('active') ? '♥' : '♡'; }

function updateCart() {
  document.getElementById('cartCount').textContent = cart.length;
  renderCart();
}

function renderCart() {
  const el = document.getElementById('cartItems');
  if (!cart.length) { el.innerHTML = '<div class="cart-empty">Your basket is empty.</div>'; document.getElementById('cartTotal').textContent = '$0.00'; return; }
  el.innerHTML = cart.map((p, i) => `
    <div class="cart-item">
      <div class="cart-item-thumb" style="background:${p.color};">${p.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${p.name}</div>
        <div class="cart-item-price">$${p.price}</div>
        <button class="cart-item-remove" onclick="removeFromCart(${i})">Remove</button>
      </div>
    </div>
  `).join('');
  const total = cart.reduce((s, p) => s + p.price, 0);
  document.getElementById('cartTotal').textContent = '$' + total.toFixed(2);
}

function openCart() {
  document.getElementById('cartDrawer').classList.add('open');
  document.getElementById('cartOverlay').classList.add('open');
}
function closeCart() {
  document.getElementById('cartDrawer').classList.remove('open');
  document.getElementById('cartOverlay').classList.remove('open');
}

renderProducts('all');
</script>
</body>
</html>
